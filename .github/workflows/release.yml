name: Release

# Fires on a version tag (e.g. v2.21). Builds + pushes the three buildable
# images to GHCR, then cuts a GitHub Release with auto-generated notes.
#
# NOTE: GitHub Actions reads this file from the TAGGED commit's tree, so the
# tag must point at a commit that contains this workflow. (open-websearch uses
# stock node:20-slim — nothing to build.)

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push images to GHCR

jobs:
  images:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # CPU/portable images. GPU users build locally with the
          # docker-compose.gpu.yml override (TORCH_EXTRA=cuXXX).
          - image: backend
            context: ./backend
          - image: frontend
            context: ./frontend
            build-args: |
              VITE_API_BASE_URL=
          - image: marker
            context: ./marker_service
    steps:
      - uses: actions/checkout@v5

      # backend (TeX Live + torch) and marker (torch + Surya) are large builds;
      # reclaim the runner's preinstalled toolchains so they don't run out of disk.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Derive version (strip leading v)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/paperhub-${{ matrix.image }}
          # The tag is vMAJOR.MINOR (e.g. v2.21); tag the image with the bare
          # version + latest. (Computed explicitly to avoid semver-parse quirks
          # on a 2-part version.)
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          build-args: ${{ matrix.build-args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Registry-backed layer cache (GHCR), not GHA cache — the torch/TeX
          # layers are far larger than the 10 GB Actions-cache quota.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/paperhub-${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/paperhub-${{ matrix.image }}:buildcache,mode=max

  release:
    name: GitHub Release
    needs: images
    runs-on: ubuntu-latest
    steps:
      # Needed so we can read frontend/src/changelog/changelog.json — the SAME
      # highlights the in-app ChangelogModal shows (FR-16) — and reuse them as
      # the Release notes, so the user-facing changelog lives in ONE place.
      - uses: actions/checkout@v5

      - name: Derive version (strip leading v)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compose release notes from the in-app changelog
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          REF_NAME: ${{ github.ref_name }}
          OWNER: ${{ github.repository_owner }}
        run: |
          file="frontend/src/changelog/changelog.json"
          # English highlights for THIS version, as markdown bullets. `// empty`
          # yields nothing when the version has no entry (older tags / hotfixes
          # that skipped the changelog) — the notes then fall back to header +
          # image refs + GitHub's auto-generated "What's Changed".
          highlights="$(jq -r --arg v "$VERSION" \
            '(.[] | select(.version == $v) | .highlights.en[] | "- " + .) // empty' "$file")"
          {
            echo "## PaperHub ${REF_NAME}"
            echo
            if [ -n "$highlights" ]; then
              echo "### What's new"
              echo "$highlights"
              echo
            fi
            echo "Container images on GHCR (also tagged \`latest\`):"
            echo
            echo '```'
            echo "ghcr.io/${OWNER}/paperhub-backend:${VERSION}"
            echo "ghcr.io/${OWNER}/paperhub-frontend:${VERSION}"
            echo "ghcr.io/${OWNER}/paperhub-marker:${VERSION}"
            echo '```'
          } > "${RUNNER_TEMP}/RELEASE_BODY.md"
          echo "----- composed release body -----"
          cat "${RUNNER_TEMP}/RELEASE_BODY.md"
          echo "body_path=${RUNNER_TEMP}/RELEASE_BODY.md" >> "$GITHUB_OUTPUT"
        id: notes

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          # Curated changelog highlights (composed above) lead; GitHub appends
          # its auto-generated "What's Changed" PR list after the body.
          generate_release_notes: true
          body_path: ${{ steps.notes.outputs.body_path }}
