# PaperHub slide style profiles — F4.4 T8
# =========================================
#
# OPERATOR-FACING REGISTRY. Every default style choice for generated
# Beamer decks lives here. Edit a profile (or add a new one) and the
# next deck PaperHub renders picks it up. NO Python change needed.
#
# Selection:
#   * env var PAPERHUB_SLIDE_STYLE_PROFILE (preferred) or the legacy
#     alias PAPERHUB_SLIDE_THEME (gold→default, metropolis→metropolis_minimal)
#   * Settings.slide_style_profile is the resolved name; default "default".
#   * Unknown env values normalise to "default" inside config.load_settings,
#     so a typo never silently emits an unrelated style.
#
# Per-deck overrides (F4.2):
#   * The chat command "edit the preamble / change the theme" routes to
#     the `edit_preamble` deck-command action, which rewrites the
#     compiled .tex's preamble block in-place. That path operates on a
#     single deck and is independent of this registry.
#
# Schema (each profile is a mapping):
#   description:                  human-readable one-liner.
#   document_class_options:       "[OPTIONS]" content (no brackets).
#   packages:                     list of \usepackage arguments,
#                                   e.g. "[T1]{fontenc}" or "{graphicx}".
#   theme:                        \usetheme{<...>}
#   colortheme:                   \usecolortheme{<...>}  (omit or null to skip)
#   fonttheme:                    \usefonttheme{<...>}   (omit or null to skip)
#   color_defs:                   name → "MODEL:value", e.g. "RGB:0,90,160"
#   beamercolor_overrides:        element → "key=value,key=value"
#   beamertemplate_suppressions:  list of template names to blank
#                                   (each emits \setbeamertemplate{NAME}{}).
#   beamersize_settings:          list of arguments to \setbeamersize.
#   custom_footline_tex:          raw multi-line LaTeX (use yaml |).
#   default_institute_tex:        raw LaTeX for \institute{...} fallback.
#   requires_unicode_packages:    extra packages added when the deck has
#                                   ANY non-ASCII text (Cyrillic, Greek,
#                                   Latin-Extended, CJK, …). Triggers
#                                   xelatex compile + Unicode main font.
#   requires_cjk_packages:        extra packages added when the deck has
#                                   CJK text (on TOP of requires_unicode).

version: 1

profiles:

  default:
    description: >
      The Final_Report gold methodology — Berlin / dolphin /
      professionalfonts / 14pt / 16:9 + accent colors + custom footline
      + booktabs/mathtools/tikz. This is the conference-grade default.
    document_class_options: "aspectratio=169,14pt"
    packages:
      - "[T1]{fontenc}"
      - "{textcomp}"
      - "{graphicx}"
      - "{booktabs}"
      - "{mathtools,amssymb}"
      - "{amsmath}"
      - "{bm}"
      - "{xcolor}"
      - "{tikz}"
    theme: "Berlin"
    colortheme: "dolphin"
    fonttheme: "professionalfonts"
    color_defs:
      accent: "RGB:0,90,160"
      accent2: "RGB:200,60,60"
      lightgray: "RGB:240,240,240"
    beamercolor_overrides:
      "block title": "bg=accent,fg=white"
      "block body": "bg=lightgray,fg=black"
    beamertemplate_suppressions:
      - "navigation symbols"
      # Berlin's default headline shows section/subsection structure,
      # but PaperHub's chain emits NO \section{} declarations, so the
      # bar would render empty/broken on every slide — the "all slides
      # have style issue" symptom from an earlier hotfix.
      - "headline"
      - "section in head/foot"
      - "subsection in head/foot"
    beamersize_settings:
      - "text margin left=0.6cm, text margin right=0.6cm"
    custom_footline_tex: |-
      \setbeamertemplate{footline}{
        \leavevmode%
        \hbox{%
        \begin{beamercolorbox}[wd=.5\paperwidth,ht=2.25ex,dp=1ex,right]{title in head/foot}%
          \usebeamerfont{title in head/foot}\insertshorttitle\hspace*{2ex}
        \end{beamercolorbox}%
        \begin{beamercolorbox}[wd=.5\paperwidth,ht=2.25ex,dp=1ex,left]{date in head/foot}%
          \usebeamerfont{date in head/foot}\hspace*{2ex}\hfill\insertframenumber{} / \inserttotalframenumber\hspace*{2ex}
        \end{beamercolorbox}}%
        \vskip0pt%
      }
    # The Berlin theme's coloured title band shrinks visibly when
    # \institute is unset. A small PaperHub wordmark anchors it without
    # overpowering the actual title. Caller-supplied \institute via
    # additional_tex_macros takes precedence (LaTeX honours last def).
    default_institute_tex: "\\institute{\\normalsize PaperHub}"
    requires_unicode_packages:
      - "{fontspec}"
    requires_cjk_packages:
      - "{xeCJK}"

  metropolis_minimal:
    description: >
      Legacy minimal preamble preserved for backward compat /
      debugging. \documentclass{beamer} + \usetheme{metropolis} +
      core math/figure packages. No accent colors, no custom
      footline, metropolis has its own minimal headline style.
    document_class_options: ""
    packages:
      - "{graphicx}"
      - "{booktabs}"
      - "{amsmath,amssymb}"
    theme: "metropolis"
    colortheme: null
    fonttheme: null
    color_defs: {}
    beamercolor_overrides: {}
    # Metropolis has its own minimal headline; do NOT suppress it
    # (would blank a deliberate theme element).
    beamertemplate_suppressions: []
    beamersize_settings: []
    custom_footline_tex: ""
    # Default institute anchor stays theme-independent — even the
    # metropolis title page benefits from a populated institute slot.
    default_institute_tex: "\\institute{\\normalsize PaperHub}"
    requires_unicode_packages:
      - "{fontspec}"
    requires_cjk_packages:
      - "{xeCJK}"
